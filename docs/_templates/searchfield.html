{%- if pagename != "search" and builder != "singlehtml" %}
<search id="searchbox" style="display: none; bottom: 0" role="search">
    <div class="searchformwrapper">
    <form class="search" action="{{ pathto('search') }}" method="get">
      <input type="text" name="q" aria-labelledby="searchlabel" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" size="18" placeholder="Find . . ."/>
      <input type="submit" value="{{ _('Search') }}" />
      <!-- <input type="hidden" name="check_keywords" value="yes" /> -->
    </form>
    </div>
</search>
<script>document.getElementById('searchbox').style.display = "block"</script>
{%- endif %}
