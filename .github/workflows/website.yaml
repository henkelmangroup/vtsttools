name: vtsttools-website
on:
  push:
    branches: [main]
  # so it updates when the target repos update
  repository_dispatch:
    types: [code_updated]
  # so we can manually update every day at 07:00 UTC
  schedule: 
    - cron: '0 7 * * *'
  # so we can manually trigger
  workflow_dispatch:
permissions: 
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install required APT packages
        run: |
          sudo apt install python3 python3-pip
          python3 -m pip install --upgrade pip
          pip install sphinx
      
      - name: Build documentation
        run: |
          git clone --depth 1 https://github.com/henkelmangroup/vtstcode
          git clone --depth 1 https://github.com/henkelmangroup/vtstscripts
          cd docs
          make html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs/_build/html
  deploy:
    needs: Build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
